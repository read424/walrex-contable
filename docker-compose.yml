version: "3.9"

services:
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:12345@postgres-dev:5432/walrex_db?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - observability-net

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    environment:
      REDIS_ADDR: "redis-testing:6379"
    ports:
      - "9121:9121"
    networks:
      - observability-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-vector-db
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - observability-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: otel-collector
    restart: unless-stopped
    command: [ "--config=/etc/otel/otel-collector.yml" ]
    volumes:
      - ./otel-collector/otel-collector.yml:/etc/otel/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # health_check
    environment:
      # Credenciales Grafana Cloud
      # Instance ID y API Key se obtienen en: grafana.com → My Account → Stack
      GRAFANA_CLOUD_OTLP_ENDPOINT: ${GRAFANA_CLOUD_OTLP_ENDPOINT}
      GRAFANA_CLOUD_INSTANCE_ID: ${GRAFANA_CLOUD_INSTANCE_ID}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY}
    depends_on:
      - postgres-exporter
      - redis-exporter
    networks:
      - observability-net

  vault-dev:
    image: hashicorp/vault:1.17
    container_name: vault-dev
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - observability-net

  walrex-app:
    image: walrex-app:latest
    container_name: walrex-app
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      QUARKUS_PROFILE: dev

      VAULT_URL: http://vault-dev:8200
      VAULT_TOKEN: dev-root-token

      # -----------------------------------------------------------------------
      # TEMPORAL — migrar a Vault KV cuando esté configurado
      # -----------------------------------------------------------------------
      DB_USERNAME: walrex_user
      DB_PASSWORD: changeme
      DB_HOST: postgres-dev
      DB_NAME: walrex_db

      REDIS_HOST: redis-testing

      JWT_SECRET: changeme-jwt-secret-must-be-at-least-32-characters
      REGISTRATION_TOKEN_SECRET: changeme-registration-token-secret

      EMAIL_PASSWORD: changeme

      TWILIO_ACCOUNT_SID: ACxxx
      TWILIO_AUTH_TOKEN: xxx
      TWILIO_FROM_NUMBER: "+123456789"
      TWILIO_WHATSAPP_FROM: "whatsapp:+123456789"

      OPENAI_API_KEY: changeme
      GROQ_API_KEY: changeme
      HUGGING_FACE_API_KEY: ""
      FINNHUB_API_TOKEN: changeme
      AZURE_DOC_INTEL_KEY: changeme
      QDRANT_API_KEY: ""

      FCM_CREDENTIALS_PATH: /etc/walrex/firebase-service-account.json

      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      DEPLOYMENT_ENV: development

    volumes:
      - /etc/walrex:/etc/walrex:ro
    depends_on:
      - vault-dev
      - otel-collector
    networks:
      - observability-net

networks:
  observability-net:
    name: net-web-nginx
    external: true

volumes:
  qdrant_storage:
