version: "3.9"

services:
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:12345@postgres-dev:5432/walrex_db?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - observability-net

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    environment:
      REDIS_ADDR: "redis-testing:6379"
    ports:
      - "9121:9121"
    networks:
      - observability-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-vector-db
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - observability-net

  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: always
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    command: vault server -dev
    networks:
      - observability-net

  walrex-app:
    image: read424/walrex-wallet:latest
    container_name: walrex-app
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      # Vault — fuente de todos los secrets de la aplicación
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: myroot

      # Observabilidad
      OTEL_EXPORTER_OTLP_ENDPOINT: http://10.0.1.48:4317
      DEPLOYMENT_ENV: development

      # Parámetros operacionales (no secrets)
      ASTROPAY_URL: https://partners-api.astropay.com
      ASTROPAY_MARGIN_PERCENT: 6

      ELASTICSEARCH_URL: http://localhost:9200
      FACE_MATCH_SERVICE_URL: http://127.0.0.1:8000
      SCREENING_THRESHOLD_BLOCK: 8.0
      SCREENING_THRESHOLD_REVIEW: 4.0

      FINNHUB_SYMBOL_PROVIDER: OANDA
      FINNHUB_RECONNECT_DELAY_MS: 5000
      FINNHUB_PRICE_CHANGE_THRESHOLD: 2.5

      BINANCE_SPOT_SYMBOL: btcusdt
      BINANCE_SPOT_THRESHOLD: 1.5
      BINANCE_SPOT_COOLDOWN_MINUTES: 5
      BINANCE_SPOT_RECONNECT_DELAY_MS: 5000

      MARKET_SYNC_EVERY: 24h

    volumes:
      # Credenciales Firebase fuera del repo → montar en la ruta del contenedor
      - /etc/walrex:/etc/walrex:ro
    depends_on:
      - vault
    networks:
      - observability-net

networks:
  observability-net:
    name: net-web-nginx
    external: true

volumes:
  qdrant_storage:
