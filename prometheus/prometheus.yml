global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'admon-catalogo'
    environment: 'dev'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

scrape_configs:
  # ==========================================
  # APPLICATION METRICS (Quarkus)
  # ==========================================
  - job_name: 'quarkus-app'
    metrics_path: '/q/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:8088']
        labels:
          service: 'admon-catalogo'
          component: 'backend'
          technology: 'quarkus'
    # Métricas importantes de Quarkus:
    # - http_server_requests_seconds_* (latencia, throughput)
    # - jvm_threads_* (uso de threads)
    # - vertx_eventloop_* (event loop metrics)
    # - http_server_active_requests (requests activos)

  # ==========================================
  # POSTGRESQL METRICS
  # ==========================================
  - job_name: 'postgresql'
    scrape_interval: 15s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          component: 'database'
          technology: 'postgresql'
    # Métricas importantes:
    # - pg_stat_database_* (conexiones, transacciones)
    # - pg_stat_bgwriter_* (cache hit ratio)
    # - pg_locks_* (locks y deadlocks)
    # - pg_stat_activity_* (slow queries)
    # - pg_replication_* (replication lag)

  # ==========================================
  # REDIS METRICS
  # ==========================================
  - job_name: 'redis'
    scrape_interval: 15s
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          component: 'cache'
          technology: 'redis'
    # Métricas importantes:
    # - redis_memory_* (uso de memoria)
    # - redis_commands_* (operaciones por segundo)
    # - redis_keyspace_* (keys, evictions)
    # - redis_net_* (I/O network)
    # - redis_slowlog_* (slow commands)

  # ==========================================
  # PROMETHEUS SELF-MONITORING
  # ==========================================
  - job_name: 'prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['127.0.0.1:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'

  # ==========================================
  # WALREX CHAT API (NestJS + Socket.io)
  # OpenTelemetry PrometheusExporter en :9464
  # ==========================================
  - job_name: 'walrex-chat-api'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['192.168.100.182:9464']
        labels:
          service: 'walrex-chat-api'
          component: 'backend'
          technology: 'nestjs'
    # Métricas custom expuestas:
    # - walrex_ws_connections_total          (total conexiones WS por namespace)
    # - walrex_ws_active_connections         (conexiones vivas en este momento)
    # - walrex_ws_events_received_total      (eventos incoming por event+namespace)
    # - walrex_ws_events_emitted_total       (eventos outgoing por event+namespace)
    # - walrex_ws_event_duration_ms          (latencia p50/p90/p99 de handlers)
    # - walrex_ws_payload_size_bytes         (tamaño de payloads JSON)
    # - walrex_ws_event_errors_total         (errores por evento)
    # - walrex_webchat_active_agents         (agentes conectados en /webchat)
    # - walrex_whatsapp_active_sessions      (sesiones WhatsApp en estado ready)
    # - walrex_whatsapp_qr_generated_total   (QR generados)
    # - walrex_chat_messages_total           (mensajes por direction+channel)
    # Más las métricas automáticas de OTel:
    # - http_server_duration_*               (latencia HTTP por ruta)
    # - db_client_operation_duration_*       (queries TypeORM/pg)