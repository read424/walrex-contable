quarkus:
  application:
    name: admon-catalogo
  http:
    auth:
      proactive: false
    body:
      uploads-directory: tmp/uploads
      merge-form-attributes: true
    limits:
      max-body-size: 10M
    port: 8089
    non-application-root-path: /q
  devservices:
    enabled: false
  test:
    integration-test-profile: test
  vault:
    url: ${VAULT_URL:http://127.0.0.1:8200}
    authentication:
      client-token: ${VAULT_TOKEN}
    kv-secret-engine-mount-path: secret
    kv-secret-engine-version: 2
    secret-config-kv-path:
      - walrex/infra/database
      - walrex/infra/redis
      - walrex/infra/azure
      - walrex/infra/qdrant
      - walrex/app/openai
      - walrex/app/finnhub
      - walrex/app/groq
      - walrex/app/hugging-face
      - walrex/app/jwt
      - walrex/app/mail
      - walrex/app/twilio
      - walrex/app/fcm
    # MEDIUM oculta valores en logs; usar LOW solo en dev local
    log-confidentiality-level: MEDIUM
    devservices:
      enabled: false

  flyway:
    migrate-at-start: true
    locations: db/migration
    baseline-on-migrate: true
    baseline-version: "0"
    repair-at-start: true

  datasource:
    devservices:
      enabled: false
    db-kind: postgresql
    # Claves inyectadas desde walrex/infra/database
    username: ${db-username}
    password: ${db-password}
    jdbc:
      url: jdbc:postgresql://${db-host:127.0.0.1}:5432/${db-name:walrex_db}
      min-size: 2
      max-size: 8
    reactive:
      url: postgresql://${db-host:127.0.0.1}:5432/${db-name:walrex_db}
      max-size: 20

  swagger-ui:
    always-include: false
    path: /swagger-ui

  redis:
    devservices:
      enabled: false
    # Clave inyectada desde walrex/infra/redis
    hosts: redis://${redis-host:127.0.0.1}:6379
    timeout: 10s
    max-pool-size: 20
    max-pool-waiting: 24
  cache:
    redis:
      expire-after-write: 30m
      prefix: "wx-admon"

  otel:
    enabled: true
    sdk:
      disabled: false
    service:
      name: admon-catalogo
    traces:
      sampler:
        arg: 1.0
    exporter:
      otlp:
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
    propagators:
      - tracecontext
      - baggage
    resource:
      attributes:
        service.name: admon-catalogo
        service.version: 1.0.0-SNAPSHOT
        deployment.environment: ${DEPLOYMENT_ENV:dev}

  micrometer:
    enabled: true
    registry-enabled-default: false
    export:
      prometheus:
        path: /q/metrics
    binder-enabled-default: true
    binder:
      jvm: true
      system: true
      http-server:
        enabled: true
        max-uri-tags: 100
      http-client:
        enabled: true
      vertx:
        enabled: true
      mp-metrics:
        enabled: true

  mailer:
    from: ${email-user:developer@texlamerced.com}
    host: ${email-host:mail.texlamerced.com}
    port: 465
    ssl: true
    username: ${email-user:developer@texlamerced.com}
    # Clave inyectada desde walrex/app/email
    password: ${email-password}

  log:
    level: INFO
    min-level: TRACE
    console:
      json: true
      json:
        date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
        pretty-print: false
        fields: timestamp,level,loggerName,message,threadName,traceId,spanId
    category:
      "io.quarkus.security":
        level: INFO
      "io.smallrye.jwt":
        level: INFO
      "io.quarkus.smallrye.jwt":
        level: INFO

  smallrye-fault-tolerance:

  langchain4j:
    devservices:
      enabled: false
    chat-model:
      provider: openai
    embedding-model:
      provider: openai
    groq-chat:
      chat-model:
        provider: openai
    ollama-chat:
      chat-model:
        provider: ollama
    ollama-embed:
      embedding-model:
        provider: ollama

    openai:
      # Clave inyectada desde walrex/app/apis
      api-key: ${openai-api-key}
      timeout: 60s
      log-requests: false
      log-responses: false
      embedding-model:
        model-name: text-embedding-3-small
        dimensions: 1536
      groq-chat:
        # Clave inyectada desde walrex/app/apis
        api-key: ${groq-api-key}
        base-url: https://api.groq.com/openai/v1
        timeout: 60s
        log-requests: false
        log-responses: false
        chat-model:
          model-name: llama-3.1-8b-instant
          temperature: 0.7

    hugging-face:
      base-url: https://router.huggingface.co
      # Clave inyectada desde walrex/app/apis
      api-key: ${hugging-face-api-key:}
      timeout: 60s
      log-requests: false
      log-responses: false
      embedding-model:
        model-id: "sentence-transformers/all-MiniLM-L6-v2"
        timeout: 60s

    ollama:
      base-url: http://localhost:11434
      timeout: 60s
      ollama-chat:
        base-url: http://localhost:11434
        timeout: 60s
        log-requests: false
        log-responses: false
        chat-model:
          model-id: llama3.2
          temperature: 0.7
      ollama-embed:
        base-url: http://localhost:11434
        timeout: 60s
        embedding-model:
          model-id: mxbai-embed-large

    qdrant:
      host: localhost
      port: 6334
      # Clave inyectada desde walrex/app/apis
      api-key: ${qdrant-api-key:}
      use-tls: false
      collection:
        name: accounting_data

  rest-client:
    astropay:
      url: ${ASTROPAY_URL:https://partners-api.astropay.com}
      scope: jakarta.enterprise.context.ApplicationScoped
      read-timeout: 10000
      connect-timeout: 5000
    elasticsearch:
      url: ${ELASTICSEARCH_URL:http://localhost:9200}
      scope: jakarta.enterprise.context.ApplicationScoped
      read-timeout: 10000
      connect-timeout: 5000
    binance-p2p:
      url: https://p2p.binance.com
      scope: jakarta.enterprise.context.ApplicationScoped
      read-timeout: 30000
      connect-timeout: 10000
    azure-doc-intel:
      url: https://mi-extractor-documentos.cognitiveservices.azure.com
      scope: jakarta.enterprise.context.ApplicationScoped
      read-timeout: 60000
      connect-timeout: 10000
      logging:
        scope: request-response
        body-limit: 1024
    face-match-service:
      url: ${FACE_MATCH_SERVICE_URL:http://127.0.0.1:8000}
      scope: jakarta.enterprise.context.ApplicationScoped
      read-timeout: 60000
      connect-timeout: 10000
    twilio-api:
      url: https://api.twilio.com
      scope: jakarta.enterprise.context.ApplicationScoped
      auth:
        basic:
          # Claves inyectadas desde walrex/app/twilio
          username: ${twilio-account-sid}
          password: ${twilio-auth-token}
      read-timeout: 10000
      connect-timeout: 5000

  qdrant:
    dimension: 1536
    distance: Cosine
    collection:
      name: accounting_data

google:
  cloud:
    # Ruta al archivo en el servidor (fuera del classpath); la ruta
    # se almacena en Vault (walrex/app/fcm → fcm-credentials-path)
    service-account-location: ${fcm-credentials-path:/etc/walrex/firebase-service-account.json}

azure:
  doc:
    intel:
      # Clave inyectada desde walrex/app/apis
      key: ${azure-doc-intel-key}

embeddings:
  sync:
    enabled: true
    on-startup: true
    batch-size: 50

rag:
  cache:
    enabled: true
    azure-ttl-days: 30
    embedding-ttl-days: 30
  llm:
    default-provider: groq
    enable-fallback: true
  search:
    account-limit: 5
    historical-entry-limit: 3
    similarity-threshold: 0.7
  historical:
    auto-sync-enabled: true
    sync-on-create: true
    sync-on-update: false

app:
  registration:
    token:
      # Clave inyectada desde walrex/app/jwt
      secret: ${registration-token-secret}
      expiration-minutes: 10
  login:
    max-attempts: 5
    lockout-minutes: 15
  twilio:
    # Claves inyectadas desde walrex/app/twilio
    account-sid: ${twilio-account-sid}
    auth-token: ${twilio-auth-token}
    from-number: ${twilio-from-number}
    whatsapp-from: ${twilio-whatsapp-from}

mp:
  jwt:
    verify:
      issuer: https://walrex.org/issuer
    # Clave inyectada desde walrex/app/jwt
    secret: ${jwt-secret}

fcm:
  enabled: true
  # Ruta inyectada desde walrex/app/fcm
  credentials-file: ${fcm-credentials-path:/etc/walrex/firebase-service-account.json}

screening:
  threshold:
    block: ${SCREENING_THRESHOLD_BLOCK:8.0}
    review: ${SCREENING_THRESHOLD_REVIEW:4.0}

astropay:
  margin-percent: ${ASTROPAY_MARGIN_PERCENT:6}

finnhub:
  # Clave inyectada desde walrex/app/apis
  api-token: ${finnhub-api-token}
  symbol-provider: ${FINNHUB_SYMBOL_PROVIDER:OANDA}
  reconnect-delay-ms: ${FINNHUB_RECONNECT_DELAY_MS:5000}
  price-change-threshold: ${FINNHUB_PRICE_CHANGE_THRESHOLD:2.5}

binance:
  spot:
    stream:
      symbol: ${BINANCE_SPOT_SYMBOL:btcusdt}
      price-change-threshold: ${BINANCE_SPOT_THRESHOLD:1.5}
      cooldown-minutes: ${BINANCE_SPOT_COOLDOWN_MINUTES:5}
      reconnect-delay-ms: ${BINANCE_SPOT_RECONNECT_DELAY_MS:5000}

walrex:
  scheduler:
    exchange-rate:
      cron: "off"
      initial:
        every: "off"
    market-sync:
      every: ${MARKET_SYNC_EVERY:24h}
