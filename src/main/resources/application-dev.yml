quarkus:
  application:
    name: admon-catalogo
  http:
    port: 8089
    non-application-root-path: /q
    access-log:
      enabled: true
      pattern: "%{REMOTE_IP} %l %u %t \"%r\" %s %b \"%{i,Referer}\" \"%{i,User-Agent}\" [%D ms]"
      log-to-file: false
  # Deshabilitar Dev Services globalmente y para todas las extensiones
  devservices:
    enabled: false
  test:
    integration-test-profile: test
  hibernate-orm:
    log:
      sql: true
      bind-parameters: true
      format-sql: true
    jdbc:
      statement-fetch-size: 50
      statement-batch-size: 20
  swagger-ui:
    always-include: true
    path: /swagger-ui
  # Deshabilitar Dev Services específicamente para Redis
  redis:
    devservices:
      enabled: false
    hosts: redis://127.0.0.1:6379
    timeout: 10s
    max-pool-size: 20
    max-pool-waiting: 24
  cache:
    redis:
      expire-after-write: 30m
      prefix: "wx-admon"
    mcp:
      server:
        name: "RemesasBotServer"
        version: 1.0.0
  # SmallRye Fault Tolerance Metrics
  flyway:
    migrate-at-start: true
    locations: db/migration
    baseline-on-migrate: true
    baseline-version: "10"
    repair-at-start: true
  datasource:
    jdbc:
      url: jdbc:postgresql://127.0.0.1:5432/walrex_db
      min-size: 1
      max-size: 4
  # ---------------------------------------------------------------------------
  # Vault — modo desarrollo
  # Levanta un servidor local: vault server -dev -dev-root-token-id=dev-root-token
  # Luego carga secrets con: docs/vault/seed-dev-secrets.sh
  # ---------------------------------------------------------------------------
  vault:
    url: http://127.0.0.1:8200
    authentication:
      client-token: ${VAULT_DEV_TOKEN:dev-root-token}
    log-confidentiality-level: LOW
    devservices:
      enabled: false

  smallrye-fault-tolerance: